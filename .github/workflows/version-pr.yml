name: Version PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  # Detects which paths changed so version-bump can be skipped
  # for PRs that only touch scripts, workflows, or project config.
  changes:
    runs-on: ubuntu-latest
    outputs:
      needs-bump: ${{ steps.filter.outputs.plugin-paths }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            plugin-paths:
              - 'plugins/**'
              - '.claude-plugin/**'
              - '.claude/CLAUDE.md'

  version-bump:
    needs: changes
    if: >-
      needs.changes.outputs.needs-bump == 'true'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Bump versions for changed plugins
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Detects changed plugins vs main and bumps each to X.Y.(Z+1)-pr.N
          npx tsx scripts/bump-pr-versions.ts --base origin/main --pr "$PR_NUMBER"

          # The script writes bumped plugin names to .bumped-plugins
          if [ -f .bumped-plugins ]; then
            NAMES=$(cat .bumped-plugins)
            rm .bumped-plugins
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: bump version for ${NAMES}"
            git push
          else
            echo "No plugins needed version bumping"
          fi

  # Gate job: required status check for branch protection.
  # Passes when version-bump succeeds OR is skipped (non-plugin PR).
  # Fails when version-bump fails or is cancelled.
  version-bump-gate:
    needs: version-bump
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check version-bump result
        run: |
          result="${{ needs.version-bump.result }}"
          echo "version-bump result: $result"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "Gate passed"
          else
            echo "Gate failed — version-bump result was: $result"
            exit 1
          fi
