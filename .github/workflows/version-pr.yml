name: Version PR

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - '.claude/CLAUDE.md'

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump versions for changed plugins
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Detects changed plugins vs main and bumps each to X.Y.(Z+1)-pr.N
          node scripts/bump-pr-versions.mjs --base origin/main --pr "$PR_NUMBER"

          # The script writes bumped plugin names to .bumped-plugins
          if [ -f .bumped-plugins ]; then
            NAMES=$(cat .bumped-plugins)
            rm .bumped-plugins
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: bump version for ${NAMES}"
            git push
          else
            echo "No plugins needed version bumping"
          fi
